name: Auto Vercel Trigger

on:
  schedule:
    - cron: "0 * * * *"   # every 1 hour
  workflow_dispatch:

concurrency:
  group: vercel-trigger
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Small random delay (avoid collisions)
        run: sleep $((RANDOM % 60))

      - name: Update trigger file
        run: |
          echo "Ping at $(date)" > .vercel_trigger.txt

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .vercel_trigger.txt
          git commit -m "Keep bot alive $(date)" || echo "No changes"
          git push
